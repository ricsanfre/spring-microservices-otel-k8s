openapi: 3.1.0
info:
  title: Cart Service API
  description: Shopping cart management — per-user cart backed by Valkey (Redis-compatible)
  version: "1.0.0"

servers:
  - url: /api/v1

security:
  - bearerAuth: []

tags:
  - name: Cart
    description: Shopping cart operations

paths:

  /cart:
    get:
      tags: [Cart]
      operationId: getCart
      summary: Get current user's cart (resolved from JWT sub)
      security:
        - bearerAuth: [cart:read]
      responses:
        "200":
          description: Current cart contents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires scope cart:read

    delete:
      tags: [Cart]
      operationId: clearCart
      summary: Clear the entire cart (called by order-service after checkout)
      security:
        - bearerAuth: [cart:write]
      responses:
        "204":
          description: Cart cleared
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires scope cart:write

  /cart/items/{productId}:
    put:
      tags: [Cart]
      operationId: upsertCartItem
      summary: Add or update a cart item (set quantity to 0 to remove)
      security:
        - bearerAuth: [cart:write]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires scope cart:write

    delete:
      tags: [Cart]
      operationId: removeCartItem
      summary: Remove a single item from the cart
      security:
        - bearerAuth: [cart:write]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated cart (after removal)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires scope cart:write
        "404":
          description: Item not in cart

components:
  schemas:

    CartItemResponse:
      type: object
      properties:
        productId:
          type: string
          description: MongoDB ObjectId of the product
        productName:
          type: string
        price:
          type: number
          format: double
        quantity:
          type: integer
          format: int32
          minimum: 1
        lineTotal:
          type: number
          format: double
          description: price × quantity

    CartResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
          description: Internal users.id (resolved from JWT sub via user-service)
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemResponse'
        totalItems:
          type: integer
          format: int32
          description: Total number of distinct product lines
        grandTotal:
          type: number
          format: double
          description: Sum of all line totals
        expiresAt:
          type: string
          format: date-time
          description: When this cart will be evicted from Valkey (TTL-based)

    CartItemRequest:
      type: object
      properties:
        productName:
          type: string
          maxLength: 255
        price:
          type: number
          format: double
          minimum: 0.0
        quantity:
          type: integer
          format: int32
          minimum: 0
          description: Desired quantity. Set to 0 to remove the item from the cart.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        OAuth2 JWT bearer token issued by Keycloak. Required scopes per operation:
        `cart:read` (GET /cart), `cart:write` (PUT/DELETE /cart/items/{productId}, DELETE /cart).
