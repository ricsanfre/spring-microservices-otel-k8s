spring:
  application:
    name: cart-service

  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/e-commerce/protocol/openid-connect/certs
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/e-commerce
      # Client Credentials — used to obtain a service account token when calling user-service / order-service
      client:
        registration:
          user-service:
            client-id: cart-service
            client-secret: ${CART_SERVICE_CLIENT_SECRET:cart-service-secret}
            authorization-grant-type: client_credentials
            scope: users:resolve
          order-service:
            client-id: cart-service
            client-secret: ${CART_SERVICE_CLIENT_SECRET:cart-service-secret}
            authorization-grant-type: client_credentials
            scope: orders:write
        provider:
          user-service:
            token-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/e-commerce/protocol/openid-connect/token
          order-service:
            token-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/e-commerce/protocol/openid-connect/token

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: cart-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ricsanfre.cart.kafka

  # HTTP service client groups — base URLs for @ImportHttpServices proxies
  http:
    serviceclient:
      user-service:
        base-url: ${USER_SERVICE_URL:http://localhost:8085}
      order-service:
        base-url: ${ORDER_SERVICE_URL:http://localhost:8082}

# Resilience4j — circuit breaker for user-service calls
resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      user-service:
        max-attempts: 3
        wait-duration: 300ms
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
  timelimiter:
    instances:
      user-service:
        timeout-duration: 3s

# Per ADR-004: Caffeine TTL for sub → internal userId cache (minutes)
cart:
  user-resolver:
    cache-ttl-minutes: 10

  mvc:
    problemdetails:
      enabled: true

  threads:
    virtual:
      enabled: true

server:
  port: 8086

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ricsanfre: INFO
