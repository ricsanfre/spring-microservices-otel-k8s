# Keycloak Operator — Installation Notes
#
# The Keycloak Operator does NOT have an official Helm chart.
# It must be installed via kubectl using the versioned manifest files published
# at https://github.com/keycloak/keycloak-k8s-resources
#
# Docs: https://www.keycloak.org/operator/installation#_installing_by_using_kubectl_without_operator_lifecycle_manager
#
# The Makefile target `make k8s-operators` runs these commands automatically.
# To run manually (replace VERSION with the desired Keycloak version):
#
# VERSION=26.6.1
#
# # 1. Install CRDs (cluster-scoped, run once)
# kubectl apply -f https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/${VERSION}/kubernetes/keycloaks.k8s.keycloak.org-v1.yml
# kubectl apply -f https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/${VERSION}/kubernetes/keycloakrealmimports.k8s.keycloak.org-v1.yml
#
# # 2. Create namespace and install operator deployment
# kubectl create namespace keycloak --dry-run=client -o yaml | kubectl apply -f -
# kubectl -n keycloak apply -f https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/${VERSION}/kubernetes/kubernetes.yml
#
# The operator watches only the namespace it is installed in (keycloak).
# See https://www.keycloak.org/operator/installation for multi-namespace setups.
