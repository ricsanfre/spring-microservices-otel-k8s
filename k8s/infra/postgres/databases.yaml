# CloudNativePG — per-service Database CRs + Secrets
# Each service gets its own database and a dedicated Postgres role.
#
# Apply:
#   kubectl apply -f k8s/infra/postgres/databases.yaml
---
# ── Superuser secret (used in cluster.yaml bootstrap) ──────────────────────
# Generate with:
#   kubectl create secret generic postgres-superuser-secret \
#     --from-literal=username=postgres \
#     --from-literal=password=<CHANGE_ME> \
#     --namespace postgres --dry-run=client -o yaml | kubectl apply -f -
#
# NOTE: Do NOT commit real credentials. Use a secrets manager or sealed-secrets in production.

# ── user-service database ──────────────────────────────────────────────────
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: users-db
  namespace: postgres
spec:
  name: users
  owner: users_owner
  cluster:
    name: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: users-db-secret
  namespace: postgres
type: kubernetes.io/basic-auth
stringData:
  username: users_owner
  # Override with a real password via:
  #   kubectl create secret generic users-db-secret \
  #     --from-literal=username=users_owner \
  #     --from-literal=password=<CHANGE_ME> \
  #     --namespace postgres --dry-run=client -o yaml | kubectl apply -f -
  password: "change-me"

# ── order-service database ─────────────────────────────────────────────────
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: orders-db
  namespace: postgres
spec:
  name: orders
  owner: orders_owner
  cluster:
    name: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: orders-db-secret
  namespace: postgres
type: kubernetes.io/basic-auth
stringData:
  username: orders_owner
  password: "change-me"
