# CloudNativePG — per-service Database CRs
# Each service gets its own database owned by a dedicated PostgreSQL role.
# Role passwords are managed by CNPG managed.roles (see cluster.yaml).
#
# Prerequisites — create credential secrets in the 'postgres' namespace before applying:
#   kubectl create secret generic users-db-secret \
#     --from-literal=username=users_owner --from-literal=password=<CHANGE_ME> \
#     --namespace postgres
#   kubectl create secret generic keycloak-db-secret \
#     --from-literal=username=keycloak_owner --from-literal=password=<CHANGE_ME> \
#     --namespace postgres
#
# Apply:
#   kubectl apply -k k8s/infra/postgres

# ── user-service database ──────────────────────────────────────────────────
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: users-db
  namespace: postgres
spec:
  name: users
  owner: users_owner
  cluster:
    name: postgres

# ── keycloak database ──────────────────────────────────────────────────────
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: keycloak-db
  namespace: postgres
spec:
  name: keycloak
  owner: keycloak_owner
  cluster:
    name: postgres

# ── order-service database ─────────────────────────────────────────────────
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: orders-db
  namespace: postgres
spec:
  name: orders
  owner: orders_owner
  cluster:
    name: postgres
