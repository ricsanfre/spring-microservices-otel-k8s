# Keycloak Operator — Keycloak CR
# Namespace: keycloak
#
# Apply:
#   kubectl apply -f k8s/infra/keycloak/keycloak.yaml
---
# Admin credentials secret — override before applying:
#   kubectl create secret generic keycloak-admin-secret \
#     --from-literal=username=admin \
#     --from-literal=password=<CHANGE_ME> \
#     --namespace keycloak --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: keycloak
type: kubernetes.io/basic-auth
stringData:
  username: admin
  password: "change-me"
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  instances: 1          # single instance for laptop staging

  # Use the wildcard TLS cert issued by cert-manager
  # (copy the secret into the keycloak namespace or use a separate cert)
  http:
    tlsSecret: keycloak-tls

  # Hostname used by Envoy Gateway HTTPRoute + OIDC discovery
  hostname:
    hostname: keycloak.local.test

  db:
    vendor: postgres
    host: postgres-rw.postgres.svc.cluster.local
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password

  # Admin credentials
  startOptimized: false
  additionalOptions:
    - name: health-enabled
      value: "true"
    - name: metrics-enabled
      value: "true"
---
# Keycloak DB secret — override before applying
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: keycloak
type: kubernetes.io/basic-auth
stringData:
  username: keycloak_owner
  password: "change-me"
---
# TLS certificate for keycloak.local.test (separate from the envoy-gateway wildcard)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: keycloak
spec:
  secretName: keycloak-tls
  duration: 8760h
  renewBefore: 720h
  commonName: "keycloak.local.test"
  dnsNames:
    - "keycloak.local.test"
  issuerRef:
    name: local-test-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
