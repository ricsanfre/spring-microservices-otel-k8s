# Strimzi — Kafka Cluster CR
# Single-node KRaft cluster (no ZooKeeper) — suitable for laptop staging.
# Namespace: kafka
#
# Apply:
#   kubectl apply -f k8s/infra/kafka/cluster.yaml
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka
  namespace: kafka
  annotations:
    # Use KRaft mode (ZooKeeper-free) — requires Strimzi 0.39+
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 3.9.0
    metadataVersion: 3.9-IV0
    replicas: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
    storage:
      type: ephemeral     # ephemeral is fine for laptop staging

  # KRaft controller (co-located in the same pod for single-node)
  kafkaNodePools:
    - name: controller
      roles:
        - controller
        - broker
      replicas: 1
      storage:
        type: ephemeral

  entityOperator:
    topicOperator: {}
    userOperator: {}
