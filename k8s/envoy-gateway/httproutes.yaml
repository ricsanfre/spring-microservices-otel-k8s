---
# ── Keycloak passthrough route ─────────────────────────────────────────────
# Routes keycloak.local.test to the Keycloak service in the keycloak namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "keycloak.local.test"
  rules:
    - backendRefs:
        - name: keycloak-service
          port: 8080
---
# ── Grafana ────────────────────────────────────────────────────────────────
# Routes grafana.local.test to the Grafana pod in the monitoring namespace.
# Release name 'lgtm' → service name 'lgtm-grafana'.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "grafana.local.test"
  rules:
    - backendRefs:
        - name: lgtm-grafana
          port: 80
