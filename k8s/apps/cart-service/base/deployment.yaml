---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: e-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cart-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cart-service
        app.kubernetes.io/part-of: e-commerce
    spec:
      serviceAccountName: cart-service

      containers:
        - name: cart-service
          # Image tag is set by the staging overlay via kustomize image transform
          image: localhost:5000/cart-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP

          envFrom:
            - configMapRef:
                name: cart-service-config

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
