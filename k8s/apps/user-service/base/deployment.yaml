---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: e-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
        app.kubernetes.io/part-of: e-commerce
    spec:
      serviceAccountName: user-service

      containers:
        - name: user-service
          # Image tag is set by the staging overlay via kustomize image transform
          image: localhost:5000/user-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8085
              protocol: TCP

          envFrom:
            - configMapRef:
                name: user-service-config

          env:
            # DB credentials from CNPG-managed secret (postgres namespace)
            # The secret is copied into e-commerce namespace by the staging overlay.
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: user-service-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-service-db-secret
                  key: password

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
