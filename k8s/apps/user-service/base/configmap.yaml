---
# Non-sensitive configuration for user-service.
# Sensitive values (DB password, Keycloak secret) are injected via Secrets
# referenced in the Deployment env section.
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: e-commerce
data:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  SERVER_PORT: "8085"
  # PostgreSQL (CNPG read-write service)
  DB_HOST: "postgres-rw.postgres.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "users"
  # Keycloak OIDC
  KEYCLOAK_URL: "https://keycloak.local.test"
  KEYCLOAK_REALM: "e-commerce"
  # OpenTelemetry (override in overlay if using a different collector)
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://grafana-lgtm.monitoring.svc.cluster.local:4318"
  OTEL_SERVICE_NAME: "user-service"
