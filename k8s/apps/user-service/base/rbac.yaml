---
# Role — minimum permissions required by Spring Cloud Kubernetes DiscoveryClient
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-service-discovery
  namespace: e-commerce
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-discovery
  namespace: e-commerce
subjects:
  - kind: ServiceAccount
    name: user-service
    namespace: e-commerce
roleRef:
  kind: Role
  name: user-service-discovery
  apiGroup: rbac.authorization.k8s.io
