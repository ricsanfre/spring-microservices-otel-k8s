# ──────────────────────────────────────────────────────────────────────────────
# E-Commerce platform — local dev Docker Compose
#
# Profiles (use --profile <name> to activate):
#   infra           Shared databases: PostgreSQL (all service DBs) + MongoDB
#   auth            Keycloak IAM (e-commerce realm)
#   observability   Grafana LGTM (Grafana + Prometheus + Loki + Tempo + OTel)
#
# Quick-start via Makefile (user-service example):
#   make us-infra-up    # starts: infra + auth + observability profiles
#   make us-infra-down  # stops containers (volumes preserved)
#
# Architecture note:
#   A single PostgreSQL instance hosts one database per service (users, orders, …).
#   A single MongoDB instance hosts one database per service (products, reviews, …).
#   Each service connects with its own credentials to its own database, preserving
#   the database-per-service isolation principle without spawning separate containers.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Observability stack ─────────────────────────────────────────────────────
  grafana-lgtm:
    image: grafana/otel-lgtm:latest
    profiles: [observability]
    ports:
      - "3000:3000"    # Grafana UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks: [e-commerce]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Shared databases ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: [infra]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres     # default admin DB; service DBs created by init script
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro   # runs init-databases.sh on first start
      - postgres-data:/var/lib/postgresql/data
    networks: [e-commerce]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7
    profiles: [infra]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks: [e-commerce]
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  valkey:
    image: valkey/valkey:8-alpine
    profiles: [infra]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    networks: [e-commerce]
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── IAM ─────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: [auth]
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"   # exposes /health/ready on management port 9000
    ports:
      - "8180:8080"    # host port 8180 matches KEYCLOAK_URL default
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    networks: [e-commerce]
    healthcheck:
      # Keycloak 26 image is based on UBI9-micro (no curl/wget).
      # Use bash /dev/tcp to call the Quarkus management health endpoint (port 9000).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

# ── Networks & volumes ─────────────────────────────────────────────────────────
networks:
  e-commerce:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  valkey-data:
  keycloak-data: